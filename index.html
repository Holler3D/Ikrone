<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Pay - Profile</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f0f2f5, #dfe6e9);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    background: white;
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    padding: 20px;
    animation: fadeIn 0.8s ease;
  }

  .profile {
    text-align: center;
  }

  .profile img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 10px;
  }

  .profile h2 {
    margin: 5px 0;
  }

  .profile p {
    color: gray;
    font-size: 14px;
  }

  .locations {
    margin-top: 20px;
  }

  .location {
    background: #f8f9fa;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
  }

  .location strong {
    display: block;
    margin-bottom: 5px;
  }

  .location img {
    width: 100%;
    border-radius: 10px;
    margin-top: 8px;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
  }
</style>
</head>

<body>

<div class="card">

  <div class="profile">
    <!-- Replace with your actual image -->
    <img src="IMG-20260430-WA0017.jpg" alt="David Pay">
    <h2>David Pay</h2>
    <p>Recent Locations</p>
  </div>

  <div class="locations">

    <div class="location">
      <strong>Visited - Stars Sweet and Curry, Slough UK</strong>
      <img src="Screenshot_20260505_131943_Maps.jpg" alt="Stars Sweet and Curry">
    </div>

    <div class="location">
      <strong>Seen - along Canterbury Avenue, Slough UK</strong>
      <img src="Screenshot_20260505_132140_Maps.jpg" alt="Canterbury Avenue">
    </div>

    <div class="location">
      <strong>Visited - Musclehut, Herne Bay</strong>
      <img src="Screenshot_20260505_132339_Maps.jpg" alt="Musclehut Herne Bay">
    </div>

  </div>

</div>

</body>
</html>
