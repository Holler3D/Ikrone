<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Pay - Activity Profile</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f0f2f5, #dfe6e9);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: white;
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    padding: 20px;
    animation: fadeIn 0.8s ease;
  }

  .profile {
    text-align: center;
  }

  .profile img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 10px;
  }

  .profile h2 {
    margin: 5px 0;
  }

  .profile p {
    color: gray;
    font-size: 14px;
  }

  .activities {
    margin-top: 20px;
  }

  .activity {
    display: flex;
    align-items: center;
    padding: 10px;
    border-radius: 10px;
    transition: 0.3s;
    cursor: pointer;
  }

  .activity:hover {
    background: #f5f6fa;
  }

  .icon {
    font-size: 18px;
    margin-right: 10px;
  }

  .filters {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
  }

  .filters button {
    flex: 1;
    margin: 2px;
    padding: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #dfe6e9;
  }

  .filters button.active {
    background: #0984e3;
    color: white;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
  }
</style>
</head>

<body>

<div class="card">
  <div class="profile">
    <img src="IMG-20260430-WA0017.jpg" alt="David Pay">
    <h2>David Pay</h2>
    <p>User Activity Overview</p>
  </div>

  <div class="filters">
    <button onclick="filterActivities('all')" class="active">All</button>
    <button onclick="filterActivities('call')">Calls</button>
    <button onclick="filterActivities('message')">Messages</button>
    <button onclick="filterActivities('view')">Views</button>
  </div>

  <div class="activities" id="activityList">

    <div class="activity call">📞 Contacted Shelley Cook (10 mins)</div>
    <div class="activity view">👁️ Viewed loopsi410</div>
    <div class="activity call">📞 Contacted Simon Cook (2 mins)</div>
    <div class="activity call">📞 Received a call</div>
    <div class="activity message">✉️ Replied to mails</div>
    <div class="activity message">📱 Conversation with Alan Cook</div>
    <div class="activity view">👁️ Viewed loopsi410</div>
    <div class="activity call">📞 Contacted Carol Pay</div>
    <div class="activity call">🏠 Contacted Bellway Homes</div>
    <div class="activity message">✉️ Read mails from Lucy Tregear</div>

  </div>
</div>

<script>
function filterActivities(type) {
  const activities = document.querySelectorAll('.activity');
  const buttons = document.querySelectorAll('.filters button');

  buttons.forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  activities.forEach(activity => {
    if (type === 'all') {
      activity.style.display = 'flex';
    } else {
      activity.style.display = activity.classList.contains(type) ? 'flex' : 'none';
    }
  });
}
</script>

</body>
</html>
