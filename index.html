<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Pay - Activity Profile</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f0f2f5, #dfe6e9);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    background: white;
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    padding: 20px;
    animation: fadeIn 0.8s ease;
  }

  .profile {
    text-align: center;
  }

  .profile img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 10px;
  }

  .profile h2 {
    margin: 5px 0;
  }

  .profile p {
    color: gray;
    font-size: 14px;
  }

  .activities {
    margin-top: 20px;
  }

  .activity {
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: #f8f9fa;
    transition: 0.3s;
  }

  .activity:hover {
    background: #eef1f5;
  }

  .clickable {
    color: #0984e3;
    cursor: pointer;
    font-weight: bold;
  }

  #gallery {
    display: none;
    margin-top: 10px;
  }

  #gallery img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
  }
</style>
</head>

<body>

<div class="card">

  <div class="profile">
    <!-- Replace 'david.jpg' with your actual image filename -->
    <img src="IMG-20260430-WA0017.jpg" alt="David Pay">
    <h2>David Pay</h2>
    <p>User Activity Overview</p>
  </div>

  <div class="activities">

    <div class="activity">
      📞 <strong>David Pay contacted Bellway Homes</strong>
    </div>

    <div class="activity">
      📍 Address: Water Lane, Angmering, West Sussex, BN16 4EJ
    </div>

    <div class="activity clickable" onclick="toggleGallery()">
      🖼️ Click to view images (13)
    </div>

    <div id="gallery">
      <!-- Add your 13 images here -->
      <img src="IMG-20260503-WA0015.jpg" alt="">
      <img src="IMG-20260503-WA0013.jpg" alt="">
      <img src="IMG-20260503-WA0004.jpg" alt="">
      <img src="IMG-20260503-WA0014.jpg" alt="">
      <img src="IMG-20260503-WA0011.jpg" alt="">
      <img src="IMG-20260503-WA0006.jpg" alt="">
      <img src="IMG-20260503-WA0008.jpg" alt="">
      <img src="IMG-20260503-WA0007.jpg" alt="">
      <img src="IMG-20260503-WA0012.jpg" alt="">
      <img src="IMG-20260503-WA0010.jpg" alt="">
      <img src="IMG-20260503-WA0009.jpg" alt="">
      <img src="IMG-20260503-WA0005.jpg" alt="">
      <img src=".jpg" alt="">
      <!-- continue up to img13.jpg -->
    </div>

  </div>

</div>

<script>
function toggleGallery() {
  const gallery = document.getElementById("gallery");
  gallery.style.display = gallery.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
